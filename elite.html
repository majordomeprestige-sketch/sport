<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>BUARD ÉLITE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--g:#00e676;--bg:#080808;--bg2:#141414;--bg3:#1e1e1e;--border:#2a2a2a;--txt:#f0f0f0;--txt2:#c0c0c0;--dim:#888;--r:14px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.page{display:none;padding:0 0 30px;animation:fu .2s ease}
.page.on{display:block}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* NAV */
.navbar{width:calc(100% - 32px);max-width:398px;background:var(--bg2);border:1px solid var(--g);border-radius:var(--r);display:flex;margin:12px 16px 0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;cursor:pointer;color:#fff !important;transition:.15s;font-size:10px;font-weight:600;letter-spacing:.5px;gap:3px}
.nb.on{color:#fff !important}
.nb svg{width:20px;height:20px;stroke-width:2;stroke:var(--g)}.nb svg{width:20px;height:20px;stroke-width:2}
/* HEADER */
.hdr{padding:22px 16px 0}
.hlbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--g);letter-spacing:3px;margin-bottom:3px}
.htitle{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:1px;line-height:1;color:#fff}
.hsub{color:var(--dim);font-size:12px;margin-top:4px}
.slbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--g);letter-spacing:3px;padding:16px 16px 8px;display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin:0 16px}
/* WEEK STRIP */
.wstrip{display:flex;gap:6px;padding:0 16px;overflow-x:auto;scrollbar-width:none}
.wstrip::-webkit-scrollbar{display:none}
.wday{flex-shrink:0;width:52px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px 3px 10px;text-align:center;cursor:pointer;transition:.15s}
.wday:active{transform:scale(.93)}
.wday.today{border-color:var(--g);background:rgba(0,230,118,.07)}
.wday.rest{cursor:default;opacity:.4}
/* SESSION CARDS */
.sc{background:var(--bg2);border:1px solid var(--g);border-radius:var(--r);margin:6px 16px 0;cursor:pointer;transition:.15s;overflow:hidden}
.sc:active{transform:scale(.985);border-color:rgba(0,230,118,.25)}
.sc-in{padding:13px 16px;display:flex;align-items:center;gap:12px}
/* SESSION HEADER */
.sess-hdr{padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;background:rgba(8,8,8,.97);z-index:9;border-top:2px solid var(--g);border-bottom:none;backdrop-filter:blur(16px)}
.btn-back{background:var(--bg2);border:1px solid var(--border);color:var(--txt);border-radius:9px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif}
/* ACCORDION */
.ac{background:var(--bg2);border:1px solid var(--g);border-radius:var(--r);margin:6px 16px 0;overflow:hidden}
.ac-h{padding:13px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.ac-h .ac-title{font-weight:700;font-size:14px;color:var(--txt);display:flex;align-items:center;gap:8px}
.ac-bd{display:none;border-top:1px solid var(--border);padding:12px 16px}
.ac-bd.on{display:block}
/* EXERCICE */
.exo{background:var(--bg2);border:1px solid var(--g);border-radius:var(--r);margin:6px 16px 0;overflow:hidden;transition:border-color .15s}
.exo.open{border-color:rgba(0,230,118,.3)}
.exo-h{padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:10px}
.exo-bd{display:none;border-top:1px solid var(--border);padding:14px 16px}
.exo-bd.on{display:block}
.exo-name{font-weight:700;font-size:14px;color:var(--txt);line-height:1.3;flex:1}
.exo-name.spec{color:#fff}
.tag{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500}
.tg{background:rgba(0,230,118,.08);color:#fff;border:1px solid var(--g)}
.tt{background:rgba(0,230,118,.07);color:#5dde9e}
.tr{background:var(--bg3);color:var(--dim)}
/* TIP */
.tip{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;font-size:12px;color:#fff;line-height:1.7;margin-bottom:12px;display:none}
.tip.on{display:block}
.tip-btn{background:transparent;border:1px solid var(--g);color:var(--g);border-radius:8px;padding:5px 12px;font-size:11px;cursor:pointer;font-weight:600;margin-bottom:12px;font-family:'DM Sans',sans-serif}
/* SETS */
.sh{display:grid;grid-template-columns:28px 1fr 1fr;gap:5px;margin-bottom:6px}
.sh>div{border-radius:7px;padding:6px 0;text-align:center;font-size:11px;font-weight:700}
.ckg{background:rgba(255,255,255,.08);color:#fff}
.crp{background:rgba(255,255,255,.08);color:#fff}
.sr{display:grid;grid-template-columns:28px 1fr 1fr;gap:5px;margin-bottom:5px;align-items:center}
.sn{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;text-align:center;color:#fff}
.ikg{background:var(--bg3);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:9px 4px;font-size:15px;text-align:center;width:100%;font-weight:700;font-family:'DM Mono',monospace}
.ikg:focus{outline:none;border-color:var(--g)}
.irp{background:var(--bg3);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:9px 4px;font-size:15px;text-align:center;width:100%;font-weight:700;font-family:'DM Mono',monospace}
.irp:focus{outline:none;border-color:var(--g)}
.tt-wrap{position:relative;display:inline-flex;align-items:center;gap:3px}
.tt-q{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:9px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;border:none;font-family:'DM Sans',sans-serif}
.tt-box{display:none;position:absolute;top:calc(100% + 6px);left:0;background:#1a1a1a;border:1px solid var(--g);border-radius:10px;padding:10px 12px;font-size:11px;color:#fff;line-height:1.9;white-space:nowrap;z-index:99;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.tt-box.on{display:block}
.chrono-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin:8px 16px 0;padding:12px 16px;display:flex;align-items:center;gap:10px}
.chrono-time{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--g);letter-spacing:2px;min-width:104px}
.chr-btn{border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif}
/* TIMER OVERLAY */
.tov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);align-items:center;justify-content:center;z-index:999;flex-direction:column}
.tov.on{display:flex}
/* CARDIO */
.copt{background:var(--bg3);border:1px solid var(--g);border-radius:12px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.15s}
.copt.selected{background:rgba(0,230,118,.08);border-color:var(--g);box-shadow:0 0 0 1px var(--g)}
/* BUTTONS */
.btn-yt{background:rgba(255,50,50,.1);border:1px solid var(--g);color:#ff4444;border-radius:6px;padding:4px 9px;font-size:11px;text-decoration:none;font-weight:700;flex-shrink:0}

.btn-timer{background:var(--bg3);border:1px solid var(--g);color:#fff;border-radius:8px;padding:7px 10px;font-size:13px;cursor:pointer;font-weight:700;flex-shrink:0;font-family:'DM Sans',sans-serif}
.btn-danger{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#ef4444;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600;font-family:'DM Sans',sans-serif}
.prog-badge{background:rgba(0,230,118,.12);color:var(--g);font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;vertical-align:middle}
/* HISTORY */
.hw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin:6px 16px 0;overflow:hidden}
.hw-h{padding:13px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.hw-bd{display:none;border-top:1px solid var(--border);padding:12px 16px}
.hw-bd.on{display:block}
/* NUTRITION */
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}
.mc{border-radius:10px;padding:10px 6px;text-align:center}
.mv{font-family:'Bebas Neue',sans-serif;font-size:22px}
.ml2{font-size:9px;color:var(--dim);margin-top:2px;letter-spacing:1px}
.meal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin:6px 16px 0;overflow:hidden}
.meal-h{padding:13px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.meal-bd{display:none;border-top:1px solid var(--border);padding:12px 16px}
.meal-bd.on{display:block}
.meal-item{font-size:13px;color:var(--txt2);padding:6px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start}
.meal-item:last-child{border-bottom:none}
.supp{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--g);border-radius:12px;margin:6px 16px 0;padding:13px 16px;display:flex;align-items:center;gap:12px}
/* FORM */
.finput{background:var(--bg3);border:1px solid var(--border);color:var(--txt);border-radius:10px;padding:10px 12px;font-size:15px;width:100%;font-weight:600;font-family:'DM Sans',sans-serif}
.finput:focus{outline:none;border-color:var(--g)}
select.finput{height:44px}
/* GLOSSAIRE — tout vert/blanc */
.gl{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin:6px 16px 0;overflow:hidden}
.gl-h{padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:12px}
.gl-ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0;background:var(--bg3);border:1px solid var(--g);color:var(--g)}
.gl-term{color:var(--g);font-weight:800;font-size:15px}
.gl-sub{color:var(--dim);font-size:11px;margin-top:2px}
.gl-bd{display:none;border-top:1px solid var(--border);padding:14px 16px}
.gl-bd.on{display:block}
.gl-line{font-size:13px;line-height:1.85;color:var(--txt2)}
.gl-line.b{color:var(--txt)}
.gl-line.h{color:#fff;font-weight:700;font-size:13px;margin-top:8px}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- TIMER OVERLAY -->
<div class="tov" id="tov">
  <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:3px;margin-bottom:24px">TEMPS DE REPOS</div>
  <div style="position:relative;width:150px;height:150px;margin-bottom:24px">
    <svg width="150" height="150" viewBox="0 0 150 150" style="transform:rotate(-90deg)">
      <circle cx="75" cy="75" r="64" fill="none" stroke="var(--bg3)" stroke-width="7"/>
      <circle id="tarc" cx="75" cy="75" r="64" fill="none" stroke="var(--g)" stroke-width="7"
        stroke-dasharray="402" stroke-dashoffset="0" stroke-linecap="round"
        style="transition:stroke-dashoffset 1s linear"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:52px;color:#fff;letter-spacing:2px" id="tdisp">0:00</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:2px;margin-top:-6px" id="ttot"></div>
    </div>
  </div>
  <div style="display:flex;gap:10px">
    <button id="tpause" onclick="tTog()" style="background:var(--bg2);border:1px solid var(--border);color:var(--txt);border-radius:12px;padding:12px 20px;font-weight:700;font-size:15px;cursor:pointer;min-width:56px">⏸</button>
    <button onclick="tClose()" style="background:var(--g);color:#000;border:none;border-radius:12px;padding:12px 24px;font-weight:700;font-size:15px;cursor:pointer;font-family:'DM Sans',sans-serif">Passer →</button>
  </div>
</div>

<!-- ══════════════ ACCUEIL ══════════════ -->
<div class="page on" id="pg-home">
  <div class="hdr" style="padding:14px 16px 12px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1"><span style="color:var(--g)">PROGRAMME</span> BUARD</div>
        <div id="wkDates" style="font-size:11px;color:#fff;margin-top:3px"></div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button onclick="wkChg(-1)" style="background:var(--bg2);border:1px solid var(--g);color:#fff;border-radius:9px;width:34px;height:34px;cursor:pointer;font-size:16px;font-weight:900">−</button>
        <div style="background:var(--bg2);border:1px solid var(--g);border-radius:9px;padding:0 14px;height:34px;display:flex;align-items:center">
          <span id="wkLbl" style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff">S1</span>
        </div>
        <button onclick="wkChg(1)" style="background:var(--bg2);border:1px solid var(--g);color:#fff;border-radius:9px;width:34px;height:34px;cursor:pointer;font-size:17px;font-weight:900">+</button>
      </div>
    </div>
  </div>

  <nav class="navbar">
    <div class="nb on" id="nb1" onclick="goPg('pg-hist','nb1');buildHist()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Historique
    </div>
    <div class="nb" id="nb2" onclick="goPg('pg-nut','nb2')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      Nutrition
    </div>
    <div class="nb" id="nb3" onclick="goPg('pg-gloss','nb3')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      Glossaire
    </div>
  </nav>

  <div id="statsCard" style="margin:10px 16px 0;background:var(--bg2);border:1px solid var(--g);border-radius:var(--r);padding:14px 16px"></div>

  <span class="slbl">SÉANCES</span>
  <div id="homeList"></div>

  <div class="sc" onclick="loadSat()" style="margin-bottom:0;border-color:#00e67640">
    <div class="sc-in">
      <div style="width:44px;height:44px;border-radius:12px;background:#00e67618;border:1px solid #00e67640;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">🏃</div>
      <div style="flex:1">
        <div style="font-family:'DM Mono',monospace;font-size:9px;color:#00e676;letter-spacing:2px">SAMEDI</div>
        <div style="font-weight:700;font-size:16px;color:var(--txt)">Cardio Intensif</div>
        <div style="font-size:11px;color:#fff;margin-top:2px">30-45 min · HIIT · Battle Rope · Rameur</div>
      </div>
      <div style="color:#00e676;font-size:34px;line-height:1;opacity:1">›</div>
    </div>
  </div>

</div>

<!-- ══════════════ SESSION ══════════════ -->
<div class="page" id="pg-sess">
  <div class="sess-hdr">
    <button class="btn-back" onclick="goHome()">←</button>
    <div style="flex:1">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--g);letter-spacing:2px" id="sLbl"></div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:#fff;line-height:1.1" id="sTitle"></div>
      <div style="font-size:11px;color:#fff" id="sSub"></div>
    </div>
  </div>

  <div class="ac" style="margin-top:6px">
    <div class="ac-h" onclick="acTog('wuBd','wuChv')">
      <span class="ac-title">🔥 Échauffement</span>
      <span id="wuChv" style="color:var(--g);font-size:16px">▼</span>
    </div>
    <div class="ac-bd" id="wuBd"><div id="wuCnt"></div></div>
  </div>

  <span class="slbl" id="exoLbl">EXERCICES</span>
  <div id="exoList"></div>
  <div id="cardioZone"></div>

  <div class="ac" style="margin-top:8px">
    <div class="ac-h" onclick="acTog('strBd','strChv')">
      <span class="ac-title">🧘 Étirements</span>
      <span id="strChv" style="color:var(--g);font-size:16px">▼</span>
    </div>
    <div class="ac-bd" id="strBd"><div id="strCnt"></div></div>
  </div>
  <div style="margin:8px 16px 16px">
    <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--g);letter-spacing:2px;margin-bottom:6px">📝 NOTE DE SÉANCE</div>
    <input type="text" id="sessNote" placeholder="Fatigue · Douleur · Super forme · Manque de sommeil..." class="finput" style="font-size:12px;border-color:var(--g)" oninput="saveNote()"/>
  </div>
</div>

<!-- ══════════════ HISTORIQUE ══════════════ -->
<div class="page" id="pg-hist">
  <div class="sess-hdr">
    <button class="btn-back" onclick="goHome()">←</button>
    <div>
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--g);letter-spacing:2px">SUIVI</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:#fff;line-height:1.1">HISTORIQUE</div>
    </div>
    <div style="display:flex;gap:6px;margin-left:auto">
      <button class="btn-timer" onclick="exportCSV()" style="font-size:11px;padding:5px 10px">📥 Export</button>
      <button class="btn-danger" onclick="clearAll()">🗑</button>
    </div>
  </div>
  <div id="histCnt"></div>
</div>

<!-- ══════════════ NUTRITION ══════════════ -->
<div class="page" id="pg-nut">
  <div class="sess-hdr">
    <button class="btn-back" onclick="goHome()">←</button>
    <div style="flex:1">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--g);letter-spacing:2px">ALIMENTATION</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:#fff;line-height:1.1">NUTRITION</div>
    </div>
    <a href="https://play.google.com/store/apps/details?id=com.josmantek.macros" target="_blank" style="background:var(--bg3);border:1px solid var(--g);border-radius:10px;padding:8px 12px;font-size:11px;color:var(--g);font-weight:700;text-decoration:none;flex-shrink:0">📊 Macros</a>
  </div>
  <span class="slbl">CONSEILS ESSENTIELS</span>
  <div id="adviceCnt"></div>
</div>

<!-- ══════════════ GLOSSAIRE ══════════════ -->
<div class="page" id="pg-gloss">
  <div class="sess-hdr">
    <button class="btn-back" onclick="goHome()">←</button>
    <div>
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--g);letter-spacing:2px">LEXIQUE</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:#fff;line-height:1.1">GLOSSAIRE</div>
    </div>
  </div>
  <div style="margin-top:8px" id="glossCnt"></div>
</div>

<script>
const SESS=[

  {term:"Surcharge progressive",ico:"04",sub:"Progresser semaine après semaine",def:"Le principe de base de la musculation.\nObjectif : augmenter le poids le plus souvent possible, sans limite théorique.\n\nRÈGLE D'OR :\n• Technique parfaite avant poids\n• Si tu sacrifies la forme → tu te blesses et tu régresses\n\nCOMMENT PROGRESSER :\n\n4×10 (reps fixes) :\n• Les reps ne changent pas\n• Si tu fais 4×10 proprement → +2.5kg la semaine suivante\n• Tu restes à 10 reps mais le poids monte toujours\n\n4×12-15 (fourchette) :\n• Tu pars à 12 reps\n• Tu montes vers 15 sur les semaines suivantes\n• Quand tu arrives à 4×15 proprement → +2.5kg et retour à 12\n\n5×3 ou 5×5 (force) :\n• Toutes les séries complètes proprement → +2.5kg la semaine suivante\n\nLE JUSTE MILIEU :\n• Trop léger : tu finis sans effort → monte le poids\n• Trop lourd : tu ne finis pas les reps → garde le poids\n• PARFAIT : tu termines la dernière rep en étant proche de l'échec"},

function wkChg(d){
  week=Math.max(1,week+d);
  localStorage.setItem('me_wk',week);
  document.getElementById('wkLbl').textContent='S'+week;
  // si une séance est ouverte, la recharger avec la nouvelle semaine
  const sessPage=document.getElementById('pg-sess');
  if(sessPage&&sessPage.classList.contains('on')&&window._currentSess){
    loadSess(window._currentSess);
  } else if(sessPage&&sessPage.classList.contains('on')&&window._currentSat){
    loadSat();
  } else {
    const lbl=document.getElementById('sLbl');
    if(lbl&&lbl.textContent.includes('SÉANCE')){
      lbl.textContent=lbl.textContent.replace(/SEMAINE \d+/,'SEMAINE '+week);

}

function togTip(id){

function seriesTip(s,r){
  if(r.includes('/')){
    const parts=r.split('/');
    return `${s} séries avec des reps dégressives :<br>`+parts.map((p,i)=>`<b>Série ${i+1} : ${p} reps</b>`).join('<br>');
  } else if(r.includes('-')&&!r.includes('"')){
    const [min,max]=r.split('-');
    return `${s} séries de <b>${min} à ${max} reps</b>.<br>Tu pars à ${min}, tu montes jusqu'à ${max} sur toutes les séries.<br>Quand tu arrives à <b>${s}×${max}</b> proprement → <b>+2.5kg</b> et tu reviens à ${min} reps.`;
  } else if(r.includes('"')){
    return `${s} séries de <b>${r}</b> — temps de maintien.`;
  } else {
    return `${s} séries de <b>${r} reps</b> fixes.<br>Les reps ne changent pas — c'est le <b>poids qui augmente</b> chaque semaine.<br>Si tu fais les ${r} reps proprement → <b>+2.5kg</b> la semaine suivante.`;
  }
}
function tempoTip(t){
  const d=[
    ['Descente','secondes — contrôle la phase excentrique'],
    ['Pause en bas','seconde(s) — maintien en position basse'],
    ['Remontée','seconde(s) — phase concentrique'],
    ['Pause en haut','seconde(s) — maintien en position haute']
  ];
  return t.split('').map((c,i)=>`<b style="color:#fff">${d[i][0]} : ${c} ${d[i][1]}</b>`).join('<br>');
}
function mkExo(ex,sId,ei){
  const spec=ex.n.startsWith('BISET')||ex.n.startsWith('SUPERSET')||ex.n.startsWith('+');
  const key=`w${week}_s${sId}_e${ei}`;
  if(!logs[key])logs[key]={sets:Array(12).fill(null).map(()=>({kg:'',rp:''}))};
  const filled=logs[key].sets.slice(0,ex.s).filter(s=>s&&(s.kg||s.rp)).length;
  const div=document.createElement('div');div.className='exo';div.id='ec_'+key;
  const bId='eb_'+key,tId='et_'+key,tbId='etb_'+key;
  let sg=`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--g);letter-spacing:2px;margin-bottom:6px">SÉRIE</div><div class="sh"><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);text-align:center">N°</div><div class="ckg">⬆ KG</div><div class="crp">⬆ REPS</div></div>`;
  for(let i=0;i<ex.s;i++){
    const kg=logs[key].sets[i]?logs[key].sets[i].kg:'';
    const rp=logs[key].sets[i]?logs[key].sets[i].rp:'';
    sg+=`<div class="sr"><div class="sn" style="font-size:10px;color:#fff">${i+1}</div><input type="number" inputmode="decimal" placeholder="—" value="${kg}" class="ikg" oninput="uSet('${key}',${i},'kg',this.value)"/><input type="number" inputmode="numeric" placeholder="—" value="${rp}" class="irp" oninput="uSet('${key}',${i},'rp',this.value)"/></div>`;
  }
  div.innerHTML=`
    <div class="exo-h">
      <div style="flex:1;min-width:0">
        <div class="exo-name${spec?' spec':''}">${ex.n}${filled>0?` <span class="prog-badge">${filled}/${ex.s}</span>`:''}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:4px">
          <span class="tag tg">${ex.s}×${ex.r}</span>
          ${ex.t?`<span style="font-family:'DM Mono',monospace;font-size:10px;color:#fff;padding:2px 7px;border-radius:5px;background:rgba(0,230,118,.08);border:1px solid var(--g)">TEMPO ${ex.t}</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:8px">
        ${ex.rest?`<button class="btn-timer" onclick="tStart(${ex.rest},event)">⏱ ${ex.rest}"</button>`:`<button class="btn-timer" onclick="tStart(90,event)">⏱ 90"</button>`}
        <a href="${ex.v}" target="_blank" onclick="event.stopPropagation()" class="btn-yt">YT</a>
        <span id="arr_${key}" onclick="togExo('${bId}','ec_${key}')" style="display:flex;flex-direction:column;align-items:center;cursor:pointer;gap:1px">
          <span style="color:var(--g);font-size:22px;font-weight:700;line-height:1">▼</span>
          <span style="font-family:'DM Mono',monospace;font-size:8px;color:#fff;letter-spacing:1px">NOTER</span>
        </span>
      </div>
    </div>
    <div class="exo-bd" id="${bId}">
      <div id="${tId}" class="tip">${ex.tip}${ex.t?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.1)"><span style="color:var(--g);font-weight:700;font-size:11px">TEMPO ${ex.t}</span><br><span style="font-size:11px;line-height:1.9">${tempoTip(ex.t)}</span></div>`:''}<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.1)"><span style="color:var(--g);font-weight:700;font-size:11px">${ex.s}×${ex.r}</span><br><span style="font-size:11px;line-height:1.9">${seriesTip(ex.s,ex.r)}</span></div><span onclick="document.getElementById('${tId}').classList.remove('on');document.getElementById('${tbId}').style.display='inline-block'" style="float:right;cursor:pointer;color:var(--g);font-size:16px;font-weight:700">✕</span></div>
      <button id="${tbId}" class="tip-btn" onclick="document.getElementById('${tId}').classList.add('on');this.style.display='none'">💡 Conseil d'exécution</button>
      ${sg}
    </div>`;
  return div;
}
function togExo(bId,cId){
  const b=document.getElementById(bId),c=document.getElementById(cId);
  b.classList.toggle('on');c.classList.toggle('open',b.classList.contains('on'));
  const key=cId.replace('ec_','');
  const arr=document.getElementById('arr_'+key);
  if(arr){
    const open=b.classList.contains('on');
    arr.querySelector('span:first-child').textContent=open?'▲':'▼';
    arr.querySelector('span:last-child').textContent=open?'':'NOTER';
  }
}
function uSet(key,i,f,v){
  if(!logs[key])logs[key]={sets:Array(12).fill(null).map(()=>({kg:'',rp:''}))};
  if(!logs[key].sets[i])logs[key].sets[i]={kg:'',rp:''};
  logs[key].sets[i][f]=v;saveLogs();buildStats();
}

function tStart(sec,e){
  if(e)e.stopPropagation();
  tTot=sec;tRem=sec;tRun=true;
  clearInterval(tInt);
  document.getElementById('tov').classList.add('on');
  document.getElementById('tpause').textContent='⏸';
  document.getElementById('tarc').style.strokeDashoffset=0;
  tDraw();
  tInt=setInterval(()=>{
    if(tRun&&tRem>0){tRem--;tDraw();}
    if(tRem===0){clearInterval(tInt);tRun=false;document.getElementById('tdisp').textContent='✓';document.getElementById('tdisp').style.color='var(--g)';}
  },1000);
}
function tDraw(){
  const m=Math.floor(tRem/60),s=tRem%60;
  document.getElementById('tdisp').textContent=m+':'+String(s).padStart(2,'0');
  document.getElementById('tdisp').style.color='#fff';
  document.getElementById('ttot').textContent=tTot+'"';
  document.getElementById('tarc').style.strokeDashoffset=tTot>0?402*(tTot-tRem)/tTot:0;
}
function tTog(){tRun=!tRun;document.getElementById('tpause').textContent=tRun?'⏸':'▶';}
function tClose(){clearInterval(tInt);document.getElementById('tov').classList.remove('on');document.getElementById('tarc').style.strokeDashoffset=0;}

function buildStats(){
  const c=document.getElementById('statsCard');if(!c)return;
  const wkeys=Object.keys(logs).filter(k=>k.startsWith('w'+week+'_'));
  const sessIds=[...new Set(wkeys.map(k=>parseInt(k.split('_s')[1])))].filter(n=>!isNaN(n));
  const nbSess=sessIds.length;
  // semaine en cours
  let volume=0,totalReps=0;
  wkeys.forEach(k=>{
    const ex=logs[k];if(!ex)return;
    ex.sets.forEach(s=>{
      if(s&&s.kg&&s.rp){volume+=parseFloat(s.kg)*parseInt(s.rp);totalReps+=parseInt(s.rp);}
      else if(s&&s.rp){totalReps+=parseInt(s.rp);}
    });
  });
  // semaine précédente
  const prevWeek=week-1;
  let volPrev=0,repsPrev=0;
  if(prevWeek>0){
    Object.keys(logs).filter(k=>k.startsWith('w'+prevWeek+'_')).forEach(k=>{
      const ex=logs[k];if(!ex)return;
      ex.sets.forEach(s=>{
        if(s&&s.kg&&s.rp){volPrev+=parseFloat(s.kg)*parseInt(s.rp);repsPrev+=parseInt(s.rp);}
        else if(s&&s.rp){repsPrev+=parseInt(s.rp);}
      });
    });
  }
  const fmt=v=>v===0?'0 kg':v>=1000?(v/1000).toFixed(1)+'t':v+'kg';
  let best1RM=0, best1RMprev=0;
  ['w'+week+'_s2_e0','w'+week+'_s2_e1'].forEach(k=>{
    if(logs[k])logs[k].sets.forEach(s=>{
      if(s&&s.kg&&s.rp){const e=parseFloat(s.kg)*(1+parseInt(s.rp)/30);if(e>best1RM)best1RM=e;}
    });
  });
  if(prevWeek>0){
    ['w'+prevWeek+'_s2_e0','w'+prevWeek+'_s2_e1'].forEach(k=>{
      if(logs[k])logs[k].sets.forEach(s=>{
        if(s&&s.kg&&s.rp){const e=parseFloat(s.kg)*(1+parseInt(s.rp)/30);if(e>best1RMprev)best1RMprev=e;}
      });
    });
  }
  const rm1Arrow=best1RM>0&&best1RMprev>0?(best1RM>best1RMprev?`<span style="color:var(--g)"> ▲</span>`:best1RM<best1RMprev?`<span style="color:#ef4444"> ▼</span>`:''):'';
  const rm1Prev=best1RMprev>0?`<div style="font-size:10px;color:var(--g);margin-top:3px;font-weight:700">S${prevWeek} · ${Math.round(best1RMprev)}kg</div>`:'';
  const rm1Display=best1RM>0?`<div style="margin-top:8px;background:var(--bg3);border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:9px;color:#fff;letter-spacing:1px">1RM ESTIMÉ — SOULEVÉ DE TERRE</div><div style="font-size:9px;color:var(--dim);margin-top:2px">Formule Epley · indicatif</div>${rm1Prev}</div><div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--g)">${Math.round(best1RM)}<span style="font-size:14px">kg</span>${rm1Arrow}</div></div>`:'';
  const arrow=(cur,prev)=>{
    if(prev===0)return'';
    if(cur>prev)return`<span style="color:var(--g);font-size:11px"> ▲</span>`;
    if(cur<prev)return`<span style="color:#ef4444;font-size:11px"> ▼</span>`;
    return`<span style="color:#fff;font-size:11px"> →</span>`;
  };
  c.innerHTML=`
    <div style="font-family:'DM Mono',monospace;font-size:9px;color:#fff;letter-spacing:3px;margin-bottom:12px">STATS — SEMAINE ${week}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:center;margin-bottom:8px">
      <div style="background:var(--bg3);border-radius:10px;padding:10px 6px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--g)">S${week}</div>
        <div style="font-size:9px;color:#fff;letter-spacing:1px;margin-top:2px">EN COURS</div>
      </div>
      <div style="background:var(--bg3);border-radius:10px;padding:10px 6px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--g)">${nbSess}<span style="font-size:14px;color:var(--g)">/6</span></div>
        <div style="font-size:9px;color:#fff;letter-spacing:1px;margin-top:2px">SÉANCES</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:center">
      <div style="background:var(--bg3);border-radius:10px;padding:10px 6px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--g)">${fmt(volume)}${arrow(volume,volPrev)}</div>
        <div style="font-size:9px;color:#fff;letter-spacing:1px;margin-top:2px">VOLUME SEM.</div>
        ${prevWeek>0?`<div style="font-size:10px;color:var(--g);margin-top:4px;font-weight:700">S${prevWeek} · ${fmt(volPrev)}</div>`:''}
      </div>
      <div style="background:var(--bg3);border-radius:10px;padding:10px 6px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--g)">${totalReps}${arrow(totalReps,repsPrev)}</div>
        <div style="font-size:9px;color:#fff;letter-spacing:1px;margin-top:2px">REPS SEM.</div>
        ${prevWeek>0?`<div style="font-size:10px;color:var(--g);margin-top:4px;font-weight:700">S${prevWeek} · ${repsPrev}</div>`:''}
      </div>
    </div>
    ${volume===0&&totalReps===0?'<div style="margin-top:10px;font-size:11px;color:#fff;text-align:center">Lance ta première séance pour suivre ta progression 💪</div>':''}
    ${rm1Display}`;
}

function exportCSV(){
  let csv='Semaine,Séance,Exercice,Série,KG,Reps\n';
  Object.keys(logs).sort().forEach(key=>{
    const parts=key.split('_');
    const w=parts[0].replace('w','');
    const s=parts[1].replace('s','');
    const e=parts[2].replace('e','');
    const sess=SESS.find(x=>x.id===parseInt(s));
    const exo=sess?sess.exos[parseInt(e)]:{n:'?'};
    logs[key].sets.forEach((set,i)=>{
      if(set&&(set.kg||set.rp)){
        csv+=`${w},${sess?sess.name:'?'},"${exo.n}",${i+1},${set.kg||''},${set.rp||''}\n`;
      }
    });
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`buard-elite-historique.csv`;
  a.click();
}

function buildHist(){
  const c=document.getElementById('histCnt');
  if(!c)return;
  const weeks=[...new Set(Object.keys(logs).map(k=>parseInt(k.split('_')[0].replace('w',''))))].sort((a,b)=>b-a);
  if(!weeks.length){c.innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--dim);font-size:14px">Aucune donnée.<br>Lance ta première séance !</div>`;return;}
  let h='';
  weeks.forEach(w=>{
    const wk=Object.keys(logs).filter(k=>k.startsWith('w'+w+'_'));
    let inner='';
    SESS.forEach(s=>{
      const sk=wk.filter(k=>k.includes('_s'+s.id+'_'));if(!sk.length)return;
    const note=localStorage.getItem(`note_w${w}_s${s.id}`)||'';
      inner+=`<div style="margin-bottom:12px"><div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--g);letter-spacing:2px;margin-bottom:6px">${s.name}${note?` <span style="color:#fff;font-weight:400;font-size:10px;letter-spacing:0">· ${note}</span>`:''}</div>`;
      sk.forEach(k=>{
        const ei=parseInt(k.split('_e')[1]);
        const ex=s.exos[ei];if(!ex)return;
        const sets=logs[k].sets.slice(0,ex.s).filter(s=>s&&(s.kg||s.rp));if(!sets.length)return;
        inner+=`<div style="background:var(--bg3);border-radius:10px;padding:10px 12px;margin-bottom:5px"><div style="color:var(--dim);font-size:11px;margin-bottom:7px">${ex.n}</div><div style="display:flex;gap:5px;flex-wrap:wrap">`;
        sets.forEach((s,i)=>inner+=`<span style="background:var(--bg);border:1px solid var(--g);border-radius:7px;padding:4px 9px;font-size:11px;font-family:'DM Mono',monospace;color:#fff">S${i+1}: ${s.kg||'?'}kg×${s.rp||'?'}</span>`);
        inner+=`</div></div>`;
      });
      inner+='</div>';
    });
    if(!inner)return;
    const bid='hb_'+w,cid='hc_'+w;
    h+=`<div class="hw"><div class="hw-h" onclick="const b=document.getElementById('${bid}');b.classList.toggle('on');document.getElementById('${cid}').textContent=b.classList.contains('on')?'▲':'▼'"><div><div style="font-weight:700;font-size:16px;color:var(--txt)">Semaine ${w}</div><div style="font-size:11px;color:var(--dim)">${wk.length} série${wk.length>1?'s':''} enregistrée${wk.length>1?'s':''}</div></div><div style="display:flex;align-items:center;gap:8px"><button class="btn-danger" onclick="event.stopPropagation();delWk(${w})">🗑</button><span id="${cid}" style="color:var(--dim);font-size:13px">▼</span></div></div><div class="hw-bd" id="${bid}">${inner}</div></div>`;
  });
  c.innerHTML=h;
}
function clearAll(){

function delWk(w){

function calcMacros(){
  const w=parseFloat(document.getElementById('mwt').value);
  const h=parseFloat(document.getElementById('mht').value);
  const a=parseFloat(document.getElementById('mag').value);
  const sex=document.getElementById('msex').value;
  const act=parseFloat(document.getElementById('mact').value);
  const g=document.getElementById('mgoal').value;
  if(!w||!h||!a||w<30||w>250||h<100||h>250||a<10||a>100){document.getElementById('mres').style.display='none';return;}
  const bmr=Math.round(10*w + 6.25*h - 5*a + (sex==='m'?5:-161));
  const tdee=Math.round(bmr*act);
  let kcalTarget, protM, lipM;
  if(g==='muscle'){kcalTarget=tdee+300; protM=2.2; lipM=1.0;}
  else if(g==='recomp'){kcalTarget=tdee-200; protM=2.4; lipM=0.9;}
  else if(g==='cut'){kcalTarget=tdee-300; protM=2.4; lipM=0.85;}
  else{kcalTarget=tdee; protM=2.0; lipM=0.9;}
  const prot=Math.round(w*protM);
  const lip=Math.round(w*lipM);
  const gluc=Math.max(0,Math.round((kcalTarget-prot*4-lip*9)/4));
  const kcalFinal=prot*4+gluc*4+lip*9;
  document.getElementById('mkcal').textContent=kcalFinal;
  document.getElementById('mprot').textContent=prot+'g';
  document.getElementById('mgluc').textContent=gluc+'g';
  document.getElementById('mlip').textContent=lip+'g';
  document.getElementById('mbase').textContent=`MB: ${bmr} kcal · TDEE: ${tdee} kcal`;
  document.getElementById('mres').style.display='block';
  const tips={muscle:`Surplus de +300 kcal. Protéines à ${prot}g (2.2g/kg) pour maximiser la synthèse musculaire. Glucides prioritaires pour l'énergie et le glycogène.`,recomp:`Déficit léger −200 kcal. Protéines très hautes (${prot}g) pour préserver le muscle tout en perdant du gras simultanément.`,cut:`Déficit modéré −300 kcal. Protéines élevées (${prot}g) pour protéger le muscle. Perte de gras progressive et durable sans sacrifier le muscle.`,maintain:`Maintenance à ${tdee} kcal. Équilibre optimal pour la performance et la récupération sur 5 séances/semaine.`};
  document.getElementById('mtip').innerHTML='💡 '+tips[g];
}

      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:20px">${a.ico}</span>
        <div style="font-weight:700;font-size:14px;color:#fff">${a.titre}</div>

    <div class="ac-bd" id="${bid}" style="font-size:13px;color:#fff;line-height:1.8">${a.txt}</div>`;

function buildGloss(){
  const c=document.getElementById('glossCnt');
  GLOSS.forEach((g,i)=>{
    const div=document.createElement('div');div.className='gl';
    const bid='gb_'+i,cid='gc_'+i;

      if(!l)return'<div style="height:5px"></div>';
      const isBullet=l.startsWith('•')||l.startsWith('→');

    }).join('');

  });
}
